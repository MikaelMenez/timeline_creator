<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <title>Gerador de Linha do Tempo</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-zinc-900 text-zinc-100 p-10 font-sans">
        <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div
                class="lg:col-span-2 bg-zinc-800 p-6 rounded-2xl border border-zinc-700"
            >
                <h1
                    class="text-2xl font-bold mb-6 text-zinc-50 border-b border-zinc-700 pb-4"
                >
                    Nova Linha do Tempo
                </h1>
                <form id="timelineForm" class="space-y-4">
                    <input
                        type="text"
                        id="titulo"
                        placeholder="Título do Evento"
                        class="w-full bg-zinc-900 p-2.5 rounded border border-zinc-700"
                    />
                    <div id="containerAcontecimentos" class="space-y-4"></div>
                    <button
                        type="button"
                        onclick="adicionarCampo()"
                        class="bg-blue-600 text-white p-2 rounded w-full"
                    >
                        + Adicionar Momento
                    </button>
                    <button
                        type="submit"
                        class="bg-emerald-600 font-bold p-3 w-full rounded mt-4"
                    >
                        ⚡ Gerar e Compilar
                    </button>
                </form>
            </div>

            <div class="bg-zinc-800 p-6 rounded-2xl border border-zinc-700">
                <h2 class="font-bold border-b border-zinc-700 pb-2 mb-4">
                    📂 Linhas no Disco
                </h2>
                <div id="listaLinks" class="space-y-2">
                    <p class="text-zinc-500 italic text-sm">Carregando...</p>
                </div>
            </div>
        </div>

        <script>
            function adicionarCampo() {
                const container = document.getElementById(
                    "containerAcontecimentos",
                );
                const div = document.createElement("div");
                div.className =
                    "p-4 bg-zinc-900 rounded border border-zinc-700 class-evento";
                div.innerHTML = `
                <input type="text" placeholder="Acontecimento" class="campo-momento w-full bg-zinc-800 p-2 rounded mb-2">
                <input type="text" placeholder="Data" class="campo-data w-full bg-zinc-800 p-2 rounded mb-2">
                <textarea placeholder="Descrição" class="campo-descricao w-full bg-zinc-800 p-2 rounded"></textarea>
            `;
                container.appendChild(div);
            }

            async function carregarArquivos() {
                const res = await fetch("/api/arquivos");
                const arquivos = await res.json();
                const container = document.getElementById("listaLinks");
                container.innerHTML = arquivos.length
                    ? ""
                    : '<p class="text-zinc-500 italic text-sm">Nenhum registro.</p>';
                arquivos.forEach((file) => {
                    container.innerHTML += `<a href="/linhas_html/${file}.html" target="_blank" class="block p-2 bg-zinc-900 rounded border border-zinc-700 text-blue-400 hover:text-blue-300">📄 ${file}</a>`;
                });
            }

            document
                .getElementById("timelineForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const titulo = document.getElementById("titulo").value;
                    const blocos = document.querySelectorAll(".class-evento");
                    const acontecimentos = Array.from(blocos).map((b, i) => ({
                        acontecimento: b.querySelector(".campo-momento").value,
                        ordem: i + 1,
                        data: b.querySelector(".campo-data").value,
                        descricao: b.querySelector(".campo-descricao").value,
                    }));

                    await fetch("/api/gerar", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ titulo, acontecimentos }),
                    });
                    carregarArquivos();
                });

            document.addEventListener("DOMContentLoaded", () => {
                adicionarCampo();
                carregarArquivos();
            });
        </script>
    </body>
</html>
